<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D GitHub Contribution Visualizer</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <!-- Premium UI Overlay -->
    <div id="ui-layer">
      <div class="glass-panel header">
        <h1>3D GitHub Contributions</h1>
        
        <form id="search-form" class="controls-row">
          <div class="input-group">
            <input type="text" id="username-input" placeholder="Enter GitHub Username" required />
          </div>
          
          <div class="input-group select-wrapper">
            <select id="theme-select" aria-label="Select Theme">
              <option value="classic">Classic 3D</option>
              <option value="isometric" selected>Isometric</option>
              <option value="skyline">Skyline City</option>
            </select>
          </div>
          
          <button type="submit" id="search-btn">Visualize</button>
        </form>
      </div>
      
      <!-- Status Box -->
      <div id="status-message" class="glass-panel status">Ready to visualize.</div>
      
      <!-- Interactive Tooltip -->
      <div id="tooltip" class="glass-panel tooltip hidden">
        <div id="tooltip-date"></div>
        <div id="tooltip-count"></div>
      </div>

      <!-- Live Analytics Dashboard -->
      <div id="stats-dashboard" class="glass-panel stats-card">
        <div class="stats-section">
          <div class="stats-label">Contributions stats</div>
          <div class="stats-row"><span class="stats-key">Total:</span> <span id="stat-total" class="stats-val">—</span></div>
        </div>
        
        <div class="stats-section">
          <div class="stats-label">Commits streaks</div>
          <div class="stats-row"><span class="stats-key">Best streak:</span> <span id="stat-streak" class="stats-val">—</span></div>
        </div>
        
        <div class="stats-section">
          <div class="stats-label">Commits per day</div>
          <div class="stats-row"><span class="stats-key">Highest day:</span> <span id="stat-max" class="stats-val">—</span></div>
          <div class="stats-row"><span class="stats-key">Average:</span> <span id="stat-avg" class="stats-val">—</span></div>
        </div>
      </div>
    </div>

    <!-- Cinematic Fade Overlay -->
    <div id="scene-transition-overlay"></div>

    <!-- 3D Canvas -->
    <div id="canvas-container"></div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
